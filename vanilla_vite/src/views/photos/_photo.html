<div class="col">
    <div class="card h-100">
        <a href="/photos/{{ photo.id }}" route>
            <img src="{{ photo.url }}" class="card-img-top" alt="{{ photo.title }}">
        </a>
        <div class="card-body">
            <h5 class="card-title">{{ photo.title }}</h5>
        </div>
        <div class="card-footer">
            <p class="card-text">Album: {{ photo.albumId }}</p>
        </div>
    </div>
</div>
